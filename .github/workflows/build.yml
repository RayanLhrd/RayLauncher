name: Build RayLauncher

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-msvc:
    name: Windows MSVC (x64)
    runs-on: windows-2022

    permissions:
      # Required for vcpkg NuGet binary cache (pushes to GitHub Packages)
      packages: write

    env:
      INSTALL_DIR: install
      INSTALL_PORTABLE_DIR: install-portable
      BUILD_DIR: build
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short version
        shell: bash
        run: |
          ver_short=`git rev-parse --short HEAD`
          echo "VERSION=$ver_short" >> $GITHUB_ENV

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: "==3.1.*"
          py7zrversion: ">=0.20.2"
          version: "6.8.1"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          modules: "qt5compat qtimageformats qtnetworkauth"
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          vsversion: 2022
          arch: amd64

      - name: Expose VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Set up vcpkg NuGet binary cache
        shell: pwsh
        env:
          USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ github.token }}
          FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        run: |
          .$(vcpkg fetch nuget) `
            sources add `
            -Source "$env:FEED_URL" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "$env:USERNAME" `
            -Password "$env:GITHUB_TOKEN"
          .$(vcpkg fetch nuget) `
            setapikey "$env:GITHUB_TOKEN" `
            -Source "$env:FEED_URL"
          "VCPKG_BINARY_SOURCES=clear;nuget,$env:FEED_URL,readwrite" | Out-File -Append $env:GITHUB_ENV

      - name: Install NSIS NScurl plugin
        shell: pwsh
        run: |
          New-Item -Name NSISPlugins -ItemType Directory -Force | Out-Null
          Invoke-WebRequest https://github.com/negrutiu/nsis-nscurl/releases/download/v24.9.26.122/NScurl.zip -OutFile NSISPlugins\NScurl.zip
          Expand-Archive -Path NSISPlugins\NScurl.zip -DestinationPath NSISPlugins\NScurl

      - name: Configure CMake (uses windows_msvc preset + vcpkg)
        run: cmake --preset windows_msvc

      - name: Build
        run: cmake --build --preset windows_msvc --config ${{ env.BUILD_TYPE }}

      - name: Run tests
        continue-on-error: true
        run: ctest --preset windows_msvc --build-config ${{ env.BUILD_TYPE }}

      - name: Install
        run: cmake --install ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      - name: Build portable bundle
        shell: pwsh
        run: |
          Copy-Item -Path ${{ env.INSTALL_DIR }} -Destination ${{ env.INSTALL_PORTABLE_DIR }} -Recurse
          cmake --install ${{ env.BUILD_DIR }} --prefix ${{ env.INSTALL_PORTABLE_DIR }} --component portable

      - name: Build installer
        shell: pwsh
        run: |
          cd ${{ env.INSTALL_DIR }}
          makensis -NOCD "${{ github.workspace }}/${{ env.BUILD_DIR }}/program_info/win_install.nsi"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RayLauncher-Setup-${{ env.VERSION }}
          path: RayLauncher-Setup.exe

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: RayLauncher-Portable-${{ env.VERSION }}
          path: ${{ env.INSTALL_PORTABLE_DIR }}/**
